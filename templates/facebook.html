<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facebook - Log In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 20px 28px 28px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo svg {
            width: 240px;
            height: auto;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #f5f6f7;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .form-group input::placeholder {
            color: #8a8d91;
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1877f2;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, opacity 0.2s;
            margin-top: 6px;
            touch-action: manipulation;
        }
        .login-btn:active {
            opacity: 0.9;
        }
        .login-btn:hover {
            background: #166fe5;
        }
        .links {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
        }
        .links a {
            color: #1877f2;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .divider {
            margin: 18px 0 16px;
            border-top: 1px solid #dadde1;
        }
        .signup-btn {
            width: 100%;
            padding: 14px;
            background: #42b72a;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            touch-action: manipulation;
        }
        .signup-btn:active {
            opacity: 0.9;
        }
        .signup-btn:hover {
            background: #36a420;
        }
        .forgot-link {
            display: block;
            margin-top: 10px;
        }
        .page-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #8a8d91;
        }
        .page-link a {
            color: #8a8d91;
            text-decoration: none;
            font-weight: 600;
        }
        .page-link a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container {
                padding: 16px 16px 20px;
                margin: 10px;
            }
            .logo svg {
                width: 180px;
            }
            .form-group input {
                padding: 12px 14px;
                font-size: 15px;
            }
            .login-btn, .signup-btn {
                padding: 12px;
                font-size: 17px;
            }
        }
        @media (max-width: 380px) {
            .logo svg {
                width: 150px;
            }
            .container {
                padding: 12px 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="42" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="900" fill="#1877f2">Facebook</text>
                <circle cx="20" cy="30" r="8" fill="#1877f2"/>
                <circle cx="20" cy="20" r="6" fill="#fff"/>
            </svg>
        </div>
        <form id="loginForm" method="POST" action="/login" autocomplete="off">
            <div class="form-group">
                <input type="text" name="email" placeholder="Email address or phone number" required autocomplete="email">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">Log In</button>
            <div class="links">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
        </form>
        <div class="divider"></div>
        <button class="signup-btn" onclick="alert('Sign up functionality is currently unavailable')">Create new account</button>
        <div class="page-link">
            <a href="#">Create a Page</a> for a celebrity, brand or business.
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = this.querySelector('.login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
        });
    </script>
</body>
</html>
